<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VPN App</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial,sans-serif;
color:white;
overflow-y:auto;
}

.container{
text-align:center;
width:90%;
max-width:350px;
margin:auto;
padding-top:40px;
padding-bottom:120px;
}

.logo{
width:180px;
margin-top:20px;
margin-bottom:20px;
box-shadow:0 0 40px cyan;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

h1{
font-size:32px;
margin-top:15px;
}

.loading-text{
font-size:16px;
opacity:.8;
margin-bottom:15px;
}

.progress{
width:100%;
height:10px;
background:#222;
border-radius:50px;
overflow:hidden;
margin-bottom:25px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ffff,#00ff88);
border-radius:50px;
animation:load 5s linear forwards;
}

@keyframes load{
from{width:0%;}
to{width:100%;}
}

.card{
background:#0d0d0d;
padding:15px;
border-radius:18px;
border:2px solid #00ffff;
box-shadow:0 0 20px #00ffff;
margin-bottom:20px;
}

.card h3{
margin-top:0;
color:#00ffff;
}

.card p{
font-size:16px;
line-height:1.8;
}

.hidden{
display:none;
}

.open-btn{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
padding:15px 35px;
font-size:22px;
font-weight:bold;
border:none;
border-radius:15px;
background:#00ffff;
color:black;
cursor:pointer;
box-shadow:0 0 25px #00ffff;
z-index:1000;
}

.open-btn:hover{
transform:translateX(-50%) scale(1.05);
}

.footer{
margin-top:20px;
font-size:12px;
opacity:.6;
}

</style>
</head>

<body>

<div class="container">

<img src="icon.png" class="logo" alt="VPN Logo">

<h1>VPN App</h1>

<p class="loading-text" id="statusText">
Initializing VPN App...
</p>

<div class="progress">
<div class="progress-bar"></div>
</div>

<div class="card">
<h3>🌐 VPN Status</h3>
<p>
🟢 Online |
🌍 Cameroon |
⚡ Fast
</p>
</div>

<div class="card">
<h3>🔒 Secure Connection</h3>
<p>
🛡️ AES-256 |
📶 28ms
</p>

<p>
🌍 IP Protected |
✅ No Leaks
</p>
</div>

<div class="card">
<h3>🕒 Current Time</h3>
<p id="clock">Loading...</p>
</div>

<p class="footer">
Powered by VPN App v2
</p>

<button class="open-btn hidden" id="openBtn">
📲 Ouvrir
</button>

</div>

<script>

setTimeout(function(){

document.getElementById("statusText").innerHTML =
"🛡️ Secure Connection Established";

document.getElementById("openBtn")
.classList.remove("hidden");

},5000);

document.getElementById("openBtn").onclick=function(){

window.location.href =
"https://formation-plus-fichiers-237.carrd.co/";

};

function updateClock(){

const now = new Date();

document.getElementById("clock").innerHTML =
now.toLocaleTimeString();

}

setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>
