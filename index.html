<body style="margin:0;background:black;color:white;font-family:Arial;">

<style>
#logo{
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}
</style>

<div id="splash" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;">

<img src="vpn-logo.png" width="120" class="logo">

<h1>VPN App</h1>
  <style>
body{
    background:black;
    color:white;
    text-align:center;
    font-family:Arial,sans-serif;
}

.open-btn{
    background:#00ff99;
    color:black;
    border:none;
    padding:12px 25px;
    border-radius:30px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;

    box-shadow:
    0 0 10px #00ff99,
    0 0 20px #00ff99,
    0 0 40px #00ff99;

    transition:0.3s;
}

.open-btn:hover{
    transform:scale(1.1);
}
    .progress-container{
    width:250px;
    height:10px;
    background:#222;
    border-radius:20px;
    margin:15px auto;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#00ff99;
    border-radius:20px;
    animation:loading 3s forwards;
}
    .logo{
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{
        filter:
        drop-shadow(0 0 5px #00ffff)
        drop-shadow(0 0 10px #00ffff);
    }

    to{
        filter:
        drop-shadow(0 0 15px #ff00ff)
        drop-shadow(0 0 30px #ff00ff);
    }
    }

@keyframes loading{
    from{
        width:0%;
    }
    to{
        width:100%;
    }
    }
    .status-card{
    background:#111;
    border:1px solid #00ffff;
    border-radius:15px;
    padding:15px;
    margin:20px auto;
    width:260px;

    box-shadow:
    0 0 10px #00ffff,
    0 0 20px rgba(0,255,255,0.3);
}

.status-card h3{
    color:#00ffff;
    margin-bottom:10px;
}

.status-card p{
    margin:8px 0;
  }
  </style>
<p>Initializing VPN App...</p>
  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>
  <div class="status-card">
    <h3>🌐 VPN Status</h3>
    <p>🟢 Status: Online</p>
    <p>🌍 Server: Cameroon</p>
    <p>⚡ Speed: Fast</p>
  </div>

<div style="
width:220px;
height:10px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:10px;">

<div id="progress" style="
width:0%;
height:100%;
background:#00ffff;
box-shadow:0 0 10px #00ffff;">
</div>

</div>

</div>

<div id="main-content" style="display:none;text-align:center;padding-top:50px;">

<h1>🚀 VPN App</h1>
<p>Accès rapide à tes fichiers VPN</p>

<a href="https://formation-plus-fichiers-237.carrd.co/">
<button class="open-btn">📲 Ouvrir</button>
</a>

</div>

<script>

let width = 0;

let interval = setInterval(function(){

width += 1;

document.getElementById("progress").style.width = width + "%";

if(width >= 100){

clearInterval(interval);

document.getElementById("splash").style.display = "none";

document.getElementById("main-content").style.display = "block";

}

}, 30);

</script>
  <script>
setTimeout(() => {
    document.getElementById("loading").style.display = "none";
    document.querySelector(".progress-container").style.display = "none";
}, 3000);
  </script>

</body>
