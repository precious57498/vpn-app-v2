<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VPN App</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
overflow:hidden;
}

.container{
text-align:center;
width:90%;
max-width:350px;
}

.logo{
width:120px;
height:120px;
object-fit:contain;
filter:drop-shadow(0 0 15px #00ffff);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

h1{
margin-top:15px;
font-size:32px;
}

.loading-text{
font-size:14px;
opacity:.8;
margin-bottom:15px;
}

.progress{
width:100%;
height:8px;
background:#222;
border-radius:50px;
overflow:hidden;
margin-bottom:25px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ffff,#00ff88);
border-radius:50px;
animation:load 5s linear forwards;
}

@keyframes load{
from{width:0%;}
to{width:100%;}
}

.card{
background:#0d0d0d;
padding:20px;
border-radius:15px;
border:2px solid #00ffff;
box-shadow:0 0 20px #00ffff;
margin-bottom:25px;
}

.card h3{
color:#00ffff;
margin-top:0;
}

.status{
margin:8px 0;
}

.hidden{
display:none;
}

.open-btn{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:12px;
background:#00ffff;
cursor:pointer;
font-weight:bold;
box-shadow:0 0 20px #00ffff;
}

.open-btn:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo" alt="VPN Logo">

<h1>VPN App</h1>

<p class="loading-text">
Initializing VPN App...
</p>

<div class="progress">
<div class="progress-bar"></div>
</div>

<div class="card">
<h3>🌐 VPN Status</h3>
<div class="status">🟢 Status: Online</div>
<div class="status">🌍 Server: Cameroon</div>
<div class="status">⚡ Speed: Fast</div>
</div>

<button class="open-btn hidden" id="openBtn">
📲 Ouvrir
</button>

</div>

<script>

setTimeout(function(){

document.querySelector(".loading-text").innerHTML =
"VPN Ready ✓";

document.getElementById("openBtn").classList.remove("hidden");

},5000);

document.getElementById("openBtn").onclick=function(){

window.location.href=
"https://formation-plus-fichiers-237.carrd.co/";

};

</script>

</body>
</html>
